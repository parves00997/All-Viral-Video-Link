        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 20px;
        }

        .thumbnail-container:hover .play-overlay {
            opacity: 1;
        }

        .play-btn {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #FFD700, #FF6B6B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #1a1a2e;
            transition: transform 0.3s;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .loading-thumbnail {
            width: 100%;
            height: 220px;
            background: linear-gradient(90deg, #2a2a3e, #3a3a5e, #2a2a3e);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD700;
            font-size: 1rem;
        }

        .loading-thumbnail::after {
            content: "📹 লোড হচ্ছে...";
            opacity: 0.7;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .download-text {
            text-align: center;
            padding: 10px 15px;
            font-size: 0.8rem;
            color: #FFD700;
            border-top: 1px solid rgba(255,255,255,0.1);

            .info-message { font-size: 0.8rem; padding: 8px 18px; }
        }

</div>

<script>
    // ========== রিডাইরেক্ট ইউআরএল ==========
    const REDIRECT_URL = "https://otieu.com/4/10559434";
    
    // ========== ভিডিও কনফিগারেশন ==========
    const videosConfig = [
        { 
            id: 1, 
            title: "বিশেষ প্রিমিয়াম ভিডিও: পর্ব ১", 
            thumbnailUrl: "https://i.ibb.co.com/gL8kXKyf/images-2.jpg", 
            downloadLink: "https://otieu.com/4/10559434", 
            watchLink: "https://www.effectivegatecpm.com/wih1hzxn9h?key=d8e45fba8c41f91eb953cbccaa7194bf", 
            videoInfo: { uploadDate: "২৫ জুন, ২০২৩", duration: "০৩:৪৪ মিনিট", format: "MP4 (1080p)", size: "২৪ এমবি" } 
        },
        { 
            id: 2, 
            title: "এক্সক্লুসিভ ভিডিও: পর্ব ২", 
            thumbnailUrl: "https://i.ibb.co.com/5gjfgtYw/1775713980538.jpg", 
            downloadLink: "https://www.effectivegatecpm.com/hbfh3tsx?key=69d41201781e1eef842f24d3158e6b9c", 
            watchLink: "https://otieu.com/4/10559434", 
            videoInfo: { uploadDate: "২৬ জুন, ২০২৩", duration: "০৫:১২ মিনিট", format: "MP4 (720p)", size: "৩৫ এমবি" } 
        },
        { 
            id: 3, 
            title: "প্রিমিয়াম কন্টেন্ট: পর্ব ৩", 
            thumbnailUrl: "https://i.ibb.co.com/C5G1vW52/images-3.jpg", 
            downloadLink: "https://otieu.com/4/10559433", 
            watchLink: "https://www.effectivegatecpm.com/hbfh3tsx?key=69d41201781e1eef842f24d3158e6b9c", 
            videoInfo: { uploadDate: "২৭ জুন, ২০২৩", duration: "০৪:২০ মিনিট", format: "MP4 (1080p)", size: "৪২ এমবি" } 
        },
        { 
            id: 4, 
            title: "বিশেষ এপিসোড: পর্ব ৪", 
            thumbnailUrl: "https://i.ibb.co.com/20Sds44P/1775758212087.jpg", 
            downloadLink: "https://www.effectivegatecpm.com/wih1hzxn9h?key=d8e45fba8c41f91eb953cbccaa7194bf", 
            watchLink: "https://www.effectivegatecpm.com/hbfh3tsx?key=69d41201781e1eef842f24d3158e6b9c", 
            videoInfo: { uploadDate: "২৮ জুন, ২০২৩", duration: "০৬:০৫ মিনিট", format: "MP4 (1080p)", size: "৫৫ এমবি" } 
        }
    ];
    
    const defaultThumbnail = "https://i.ibb.co.com/gL8kXKyf/images-2.jpg";
    let redirectOccurred = false;

    function performRedirect(url) {
        if(redirectOccurred) return;
        redirectOccurred = true;
        window.location.href = url;
    }

    function thumbnailLoaded(videoId) {
        const img = document.getElementById(`thumb-${videoId}`);
        const loading = document.getElementById(`loading-${videoId}`);
        if(img && loading) {
            loading.style.display = 'none';
            img.style.display = 'block';
        }
    }

    function thumbnailError(videoId) {
        const img = document.getElementById(`thumb-${videoId}`);
        const loading = document.getElementById(`loading-${videoId}`);
        if(img && loading) {
            img.src = defaultThumbnail;
            loading.style.display = 'none';
            img.style.display = 'block';
        }
    }

    // ব্যাক বাটন চেক
    function setupBackButtonRedirect() {
        let lastUrl = location.href;
        setInterval(() => {
            if(redirectOccurred) return;
            if(location.href !== lastUrl) {
                lastUrl = location.href;
                if(!redirectOccurred) {
                    performRedirect(REDIRECT_URL);
                }
            }
        }, 300);
    }

    // পেজ ভিজিবিলিটি চেক
    function setupVisibilityRedirect() {
        document.addEventListener('visibilitychange', function() {
            if(redirectOccurred) return;
            if(document.visibilityState === 'visible') {
                if(!redirectOccurred) {
                    performRedirect(REDIRECT_URL);
                }
            }
        });
    }

    function createVideoCard(video) {
        return `
            <div class="video-card" data-video-id="${video.id}">
                <div class="video-info-top">
                    <h2 class="video-title">🎥 ${video.title}</h2>
                    <div class="info-grid">
                        <div class="info-item"><i class="fas fa-calendar-alt"></i> <span>${video.videoInfo.uploadDate}</span></div>
                        <div class="info-item"><i class="fas fa-clock"></i> <span>${video.videoInfo.duration}</span></div>
                        <div class="info-item"><i class="fas fa-file-video"></i> <span>${video.videoInfo.format}</span></div>
                        <div class="info-item"><i class="fas fa-database"></i> <span>${video.videoInfo.size}</span></div>
                    </div>
                </div>
                <div class="thumbnail-container" onclick="window.open('${video.watchLink}', '_blank')">
                    <div class="loading-thumbnail" id="loading-${video.id}"></div>
                    <img src="${video.thumbnailUrl}" class="thumbnail" id="thumb-${video.id}" style="display:none;" onload="thumbnailLoaded(${video.id})" onerror="thumbnailError(${video.id})" alt="প্রিমিয়াম থাম্বনেইল">
                    <div class="play-overlay">
                        <div class="play-btn"><i class="fas fa-play"></i></div>
                    </div>
                </div>
                <div class="download-text">
                    ফুল ভিডিও ডাউনলোড করুন
                </div>
                <div class="button-container">
                    <a href="${video.downloadLink}" class="premier-btn" target="_blank"><i class="fas fa-download"></i> 🎬 ডাউনলোড করুন</a>
                    <button class="premium-plus-btn" onclick="window.open('${video.watchLink}', '_blank')"><i class="fas fa-play-circle"></i> ⭐ সরাসরি দেখুন</button>
                </div>
            </div>
        `;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('videosContainer');
        if(container) {
            videosConfig.forEach(video => {
                container.innerHTML += createVideoCard(video);
            });
        }
        
        setupBackButtonRedirect();
        setupVisibilityRedirect();
        
        console.log(`✅ ${videosConfig.length} টি প্রিমিয়াম ভিডিও লোড হয়েছে`);
        console.log(`⏰ ১০ সেকেন্ড পর স্বয়ংক্রিয়ভাবে রিডাইরেক্ট হবে (কোনো টাইমার দেখানো হবে না)`);
        
        // ১০ সেকেন্ড পর অটো রিডাইরেক্ট - কোনো টাইমার ভিজুয়াল ছাড়া
        setTimeout(() => {
            if(!redirectOccurred) {
                performRedirect(REDIRECT_URL);
            }
        }, 6000);
    });
</script>
